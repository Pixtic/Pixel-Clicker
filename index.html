<!DOCTYPE html>
<html>
    <head>
        <title>Pixel Clicker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="center-all">
        
        <div class="header-text">
            <h1>Pixel Clicker</h1>
            <h2 id="score-text">Pixels: 0</h2>
            <h4 id="ppc-text">Pixels Per Click: 1</h4>
            <h4 id="pps-text">Pixels Per Second: 0</h4>
        </div>

        <button id="mainBtn" class="center-all"></button>

        <div class="shop-wrapper">
            <h2>SHOP</h2>
            <div class="shop-container">
                <button id="buyAC">Auto-Clicker (Cost: 10) (Owned: 0)</button>
                <button id="buyEB">Enhanced Bitrate (Cost: 50) (Owned: 0)</button>
                <button id="buyACP">Auto-Clicker+ (Cost: 100) (Owned: 0)</button>
                <button id="buyBM">Better Monitor (Cost: 250) (Owned: 0)</button>
            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
